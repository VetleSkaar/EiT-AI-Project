services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Point to Ollama running on the host machine.
      # host.docker.internal resolves to the host on macOS/Windows automatically;
      # the extra_hosts entry below makes it work on Linux as well.
      - OLLAMA_API_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    env_file:
      - path: ./frontend/.env
        required: false
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
